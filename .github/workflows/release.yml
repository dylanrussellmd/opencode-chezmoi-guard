name: Release

# Publishes @dylanrussell/chezmoi-guard to npm when a semver tag (vX.Y.Z) is pushed.
# Auth is npm Trusted Publishing via OIDC — no NPM_TOKEN secret is stored.
# The job mints a short-lived OIDC token that npm trusts because this exact
# repo + workflow filename is registered as a trusted publisher on npmjs.com.
#
# Setup (one-time, after first publish): on npmjs.com → package settings →
# Trusted Publishers → add:
#   repository: dylanrussellmd/opencode-chezmoi-guard
#   workflow filename: release.yml
#   environment: (leave blank)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  id-token: write   # REQUIRED: lets the job mint the OIDC token npm verifies
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # Never cache deps in a release build (supply-chain hygiene).

      # Trusted Publishing (OIDC) requires npm >= 11.5.1. Pinned to the 11.x
      # line: npm@12.0.0 ships a broken provenance path on hosted runners
      # (MODULE_NOT_FOUND: 'sigstore' from libnpmpublish — broke agent-router's
      # v0.2.0 release). Revisit the pin once npm 12 publishes cleanly.
      - name: upgrade npm (OIDC support)
        run: npm install -g npm@11

      - name: install (frozen)
        run: npm ci

      # Re-run the full gate so a tag can never ship something main wouldn't.
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build
      - name: test
        run: npm test

      # Guard: the tag (vX.Y.Z) must match package.json "version" exactly, so
      # `git tag v0.1.1` on a package.json still at 0.1.0 fails loudly instead
      # of publishing a mismatched artifact.
      - name: verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "tag and package.json agree on $PKG_VERSION"

      # No --otp, no NODE_AUTH_TOKEN: OIDC + modern npm authenticate silently.
      # --provenance attaches a signed build-provenance attestation (public repos).
      # Skip when the version is already on the registry (e.g. the first
      # release was published manually before OIDC registration) so re-pushed
      # tags stay green instead of failing on EPUBLISHCONFLICT.
      - name: publish
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already on the registry — skipping publish"
            exit 0
          fi
          npm publish --access public --provenance
